{{define "layout"}}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}YouTube Translator{{end}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0A0A0A',
            card: '#1A1A1A',
            accent: '#FF4444',
            'text-primary': '#FFFFFF',
            'text-secondary': '#999999',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0A0A0A; color: #FFFFFF; font-family: system-ui, -apple-system, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
    ::-webkit-scrollbar-button { display: none; }
    * { scrollbar-width: thin; scrollbar-color: #2a2a4a transparent; }
  </style>
  {{block "head" .}}{{end}}
</head>
<body class="min-h-screen bg-bg">
  {{block "content" .}}{{end}}
  <script src="/static/app.js"></script>
  {{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
