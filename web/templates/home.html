{{define "title"}}YouTube Translator{{end}}

{{define "content"}}
<div class="flex items-center justify-center min-h-screen" x-data="homeApp()">
  <div class="w-full max-w-lg px-6">
    <!-- Логотип -->
    <div class="text-center mb-10">
      <div class="text-6xl mb-4">🌐</div>
      <h1 class="text-3xl font-bold text-text-primary">YouTube Translator</h1>
      <p class="text-text-secondary mt-2">Перевод видео в реальном времени</p>
    </div>

    <!-- URL Input -->
    <div class="bg-card rounded-2xl p-6">
      <label class="block text-text-secondary text-sm mb-2">Ссылка на YouTube видео</label>
      <input
        type="text"
        x-model="url"
        @keydown.enter="go()"
        placeholder="https://youtube.com/watch?v=..."
        class="w-full bg-bg border border-gray-700 rounded-xl px-4 py-3 text-text-primary placeholder-gray-600 focus:border-accent focus:outline-none transition"
      >
      <p x-show="error" x-text="error" class="text-accent text-sm mt-2"></p>

      <button
        @click="go()"
        :disabled="!url.trim()"
        class="w-full mt-4 bg-accent hover:bg-red-600 disabled:opacity-30 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-xl transition"
      >
        Смотреть с переводом
      </button>
    </div>

    <!-- Быстрые настройки -->
    <div class="mt-6 text-center">
      <a href="#" @click.prevent="showSettings = !showSettings" class="text-text-secondary hover:text-text-primary text-sm transition">
        ⚙ Настройки
      </a>
    </div>

    <!-- Панель настроек -->
    <div x-show="showSettings" x-transition class="mt-4 bg-card rounded-2xl p-6">
      <h3 class="text-sm font-semibold text-text-secondary mb-3">Язык перевода</h3>
      <div class="flex flex-wrap gap-2 mb-4">
        <template x-for="lang in languages" :key="lang.code">
          <button
            @click="$store.settings.targetLanguage = lang.code"
            :class="$store.settings.targetLanguage === lang.code ? 'bg-accent text-white' : 'bg-bg text-text-secondary hover:text-text-primary'"
            class="px-3 py-1.5 rounded-lg text-sm transition"
            x-text="lang.label"
          ></button>
        </template>
      </div>

      <h3 class="text-sm font-semibold text-text-secondary mb-3">Адрес сервера</h3>
      <input
        type="text"
        x-model="$store.settings.backendUrl"
        class="w-full bg-bg border border-gray-700 rounded-xl px-4 py-2 text-text-primary text-sm focus:border-accent focus:outline-none transition"
      >
    </div>
  </div>
</div>
{{end}}

{{define "scripts"}}
<script>
function homeApp() {
  return {
    url: '',
    error: '',
    showSettings: false,
    languages: [
      { code: 'ru', label: 'RUS' },
      { code: 'en', label: 'ENG' },
      { code: 'de', label: 'DEU' },
      { code: 'es', label: 'ESP' },
      { code: 'fr', label: 'FRA' },
      { code: 'zh', label: '中文' },
      { code: 'ja', label: '日本' },
      { code: 'ko', label: '한국' },
    ],
    go() {
      this.error = '';
      const videoId = extractVideoId(this.url);
      if (!videoId) {
        this.error = 'Некорректная ссылка на YouTube';
        return;
      }
      window.location.href = '/player/' + videoId + '?url=' + encodeURIComponent(this.url);
    }
  };
}
</script>
{{end}}

{{template "layout" .}}
