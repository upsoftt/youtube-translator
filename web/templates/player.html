{{define "title"}}Перевод — YouTube Translator{{end}}

{{define "content"}}
<div class="relative w-full h-screen flex flex-col" x-data="playerApp('{{.VideoID}}', '{{.VideoURL}}')" @keydown.escape="showPanel = false">

  <!-- YouTube IFrame -->
  <div class="flex-1 relative bg-black">
    <div id="youtube-player" class="w-full h-full"></div>

    <!-- Субтитры -->
    <div
      x-show="subtitle"
      class="absolute bottom-[15%] left-1/2 -translate-x-1/2 max-w-[80%] bg-black/70 backdrop-blur-sm px-6 py-3 rounded-xl text-center"
    >
      <span class="text-white text-lg leading-relaxed" x-text="subtitle"></span>
    </div>

    <!-- Буферизация overlay -->
    <div
      x-show="status === 'buffering' || status === 'connecting'"
      class="absolute inset-0 bg-black/60 flex items-center justify-center"
    >
      <div class="text-center">
        <div class="animate-spin w-10 h-10 border-4 border-accent border-t-transparent rounded-full mx-auto"></div>
        <p class="text-text-secondary mt-3" x-text="statusMessage"></p>
      </div>
    </div>
  </div>

  <!-- Плавающие кнопки (нижний правый угол) -->
  <div class="absolute bottom-6 right-6 flex gap-3 z-30">
    <!-- Кнопка перевода -->
    <button
      @click="toggleTranslation()"
      :class="isTranslating ? 'bg-accent' : 'bg-card hover:bg-gray-700'"
      class="relative w-12 h-12 rounded-full flex items-center justify-center text-white text-lg font-bold shadow-lg transition"
    >
      文A
      <span x-show="isTranslating" class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full"></span>
    </button>

    <!-- Кнопка настроек -->
    <button
      @click="showPanel = !showPanel"
      class="w-12 h-12 rounded-full bg-card hover:bg-gray-700 flex items-center justify-center text-white text-xl shadow-lg transition"
    >⚙</button>
  </div>

  <!-- Панель управления (glass) -->
  <div
    x-show="showPanel" x-transition
    class="absolute bottom-24 right-6 w-[360px] max-h-[70vh] overflow-y-auto bg-card/90 backdrop-blur-md rounded-2xl p-5 z-30 shadow-2xl"
  >
    <!-- Статус -->
    <div class="flex items-center gap-2 mb-4">
      <span
        :class="{
          'bg-green-500': status === 'translating',
          'bg-yellow-500': status === 'connecting' || status === 'recognizing' || status === 'buffering',
          'bg-red-500': status === 'error',
          'bg-gray-500': status === 'idle' || status === 'finished'
        }"
        class="w-2 h-2 rounded-full"
      ></span>
      <span class="text-text-secondary text-sm" x-text="statusMessage"></span>
    </div>

    <!-- Провайдеры -->
    <div x-show="providerInfo.stt" class="bg-bg/50 rounded-xl px-3 py-2 mb-4 text-xs text-text-secondary">
      <span x-text="'STT: ' + providerInfo.stt"></span> ·
      <span x-text="'Перевод: ' + providerInfo.translation"></span> ·
      <span x-text="'TTS: ' + providerInfo.tts"></span>
    </div>

    <!-- Режим -->
    <div class="mb-4">
      <label class="text-xs text-text-secondary mb-1 block">Режим</label>
      <div class="flex gap-2">
        <button
          @click="$store.settings.translationMode = 'free'"
          :class="$store.settings.translationMode === 'free' ? 'bg-accent text-white' : 'bg-bg text-text-secondary'"
          class="flex-1 py-2 rounded-lg text-sm transition"
        >Бесплатный</button>
        <button
          @click="$store.settings.translationMode = 'streaming'"
          :class="$store.settings.translationMode === 'streaming' ? 'bg-accent text-white' : 'bg-bg text-text-secondary'"
          class="flex-1 py-2 rounded-lg text-sm transition"
        >Streaming (API)</button>
      </div>
    </div>

    <!-- Язык -->
    <div class="mb-4">
      <label class="text-xs text-text-secondary mb-1 block">Язык</label>
      <div class="flex flex-wrap gap-1.5">
        <template x-for="lang in languages" :key="lang.code">
          <button
            @click="$store.settings.targetLanguage = lang.code"
            :class="$store.settings.targetLanguage === lang.code ? 'bg-accent text-white' : 'bg-bg text-text-secondary hover:text-text-primary'"
            class="px-2.5 py-1 rounded-lg text-xs transition"
            x-text="lang.label"
          ></button>
        </template>
      </div>
    </div>

    <!-- Громкость оригинала -->
    <div class="mb-3">
      <label class="text-xs text-text-secondary mb-1 block">
        Оригинал: <span x-text="Math.round($store.settings.originalVolume * 100) + '%'"></span>
      </label>
      <input type="range" min="0" max="1" step="0.05"
        x-model.number="$store.settings.originalVolume"
        @input="setOriginalVolume($store.settings.originalVolume)"
        class="w-full accent-accent"
      >
    </div>

    <!-- Громкость перевода -->
    <div class="mb-3">
      <label class="text-xs text-text-secondary mb-1 block">
        Перевод: <span x-text="Math.round($store.settings.translationVolume * 100) + '%'"></span>
      </label>
      <input type="range" min="0" max="1" step="0.05"
        x-model.number="$store.settings.translationVolume"
        @input="audioQueue.setVolume($store.settings.translationVolume)"
        class="w-full accent-accent"
      >
    </div>
  </div>
</div>
{{end}}

{{define "scripts"}}
<script>
function playerApp(videoId, videoUrl) {
  return {
    videoId,
    videoUrl: videoUrl || 'https://www.youtube.com/watch?v=' + videoId,
    isTranslating: false,
    showPanel: false,
    subtitle: '',
    status: 'idle',
    statusMessage: 'Ожидание',
    providerInfo: { stt: '', translation: '', tts: '' },
    player: null,
    wsClient: null,
    audioQueue: null,
    pollTimer: null,
    languages: [
      { code: 'ru', label: 'RUS' }, { code: 'en', label: 'ENG' },
      { code: 'de', label: 'DEU' }, { code: 'es', label: 'ESP' },
      { code: 'fr', label: 'FRA' }, { code: 'zh', label: '中文' },
      { code: 'ja', label: '日本' }, { code: 'ko', label: '한국' },
    ],

    init() {
      this.audioQueue = new AudioQueue();
      this.audioQueue.onSubtitleChange = (text) => { this.subtitle = text; };
      this.loadYouTubeAPI();
    },

    loadYouTubeAPI() {
      if (window.YT && window.YT.Player) {
        this.createPlayer();
        return;
      }
      window.onYouTubeIframeAPIReady = () => this.createPlayer();
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    },

    createPlayer() {
      this.player = new YT.Player('youtube-player', {
        videoId: this.videoId,
        playerVars: { autoplay: 1, controls: 1, modestbranding: 1, rel: 0 },
        events: {
          onReady: () => this.startPolling(),
          onStateChange: (e) => this.onStateChange(e),
        }
      });
    },

    startPolling() {
      let lastTime = 0;
      this.pollTimer = setInterval(() => {
        if (!this.player || !this.player.getCurrentTime) return;
        const t = this.player.getCurrentTime();
        // Seek detection
        if (Math.abs(t - lastTime) > 1.5 && this.isTranslating) {
          this.wsClient?.send('seek', { time: t });
          this.audioQueue.clear();
        }
        lastTime = t;
        // Обновляем playback time на сервере
        if (this.isTranslating) {
          this.wsClient?.send('playback_time', { time: t });
        }
        // Обновляем audioQueue
        this.audioQueue.videoTime = t;
        this.audioQueue.checkQueue();
      }, 250);
    },

    onStateChange(event) {
      if (event.data === YT.PlayerState.PAUSED) {
        this.audioQueue.pause();
      } else if (event.data === YT.PlayerState.PLAYING) {
        this.audioQueue.resume();
      }
    },

    setOriginalVolume(vol) {
      if (this.player && this.player.setVolume) {
        this.player.setVolume(vol * 100);
      }
    },

    toggleTranslation() {
      if (this.isTranslating) {
        this.stopTranslation();
      } else {
        this.startTranslation();
      }
    },

    startTranslation() {
      this.isTranslating = true;
      this.status = 'connecting';
      this.statusMessage = 'Подключение...';

      const settings = Alpine.store('settings');
      const wsUrl = settings.backendUrl.replace('http', 'ws') + '/ws';

      this.wsClient = new WsClient(wsUrl);
      this.wsClient.onMessage = (type, data) => this.handleMessage(type, data);
      this.wsClient.onClose = () => {
        if (this.isTranslating) {
          this.status = 'error';
          this.statusMessage = 'Соединение потеряно';
        }
      };

      this.wsClient.connect(() => {
        const seekTime = this.player?.getCurrentTime?.() || 0;
        this.wsClient.send('start', {
          videoUrl: this.videoUrl,
          settings: {
            targetLanguage: settings.targetLanguage,
            sttProvider: settings.sttProvider,
            translationProvider: settings.translationProvider,
            ttsProvider: settings.ttsProvider,
            translationMode: settings.translationMode,
            seekTime,
            preferSubtitles: true,
            apiKeys: {
              deepgram: settings.deepgramApiKey || '',
              openai: settings.openaiApiKey || '',
            }
          }
        });
      });
    },

    stopTranslation() {
      this.isTranslating = false;
      this.wsClient?.send('stop', {});
      this.wsClient?.close();
      this.wsClient = null;
      this.audioQueue.clear();
      this.subtitle = '';
      this.status = 'idle';
      this.statusMessage = 'Ожидание';
      this.providerInfo = { stt: '', translation: '', tts: '' };
    },

    handleMessage(type, data) {
      switch (type) {
        case 'segment':
          this.audioQueue.enqueue(data);
          break;
        case 'status':
          this.statusMessage = data.message;
          if (data.message.includes('активен')) this.status = 'translating';
          else if (data.message.includes('Инициализация') || data.message.includes('распознавания')) this.status = 'buffering';
          break;
        case 'error':
          this.status = 'error';
          this.statusMessage = data.message;
          break;
        case 'provider_info':
          this.providerInfo = data;
          break;
        case 'pause_video':
          this.player?.pauseVideo?.();
          break;
        case 'resume_video':
          this.player?.playVideo?.();
          break;
      }
    },

    destroy() {
      if (this.pollTimer) clearInterval(this.pollTimer);
      this.stopTranslation();
    }
  };
}
</script>
{{end}}

{{template "layout" .}}
